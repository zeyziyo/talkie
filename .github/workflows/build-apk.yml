name: Build Android APK
# Triggering build v1.8.5+39 again

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle' # Enable Gradle caching

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable' # Use latest stable version
        cache: true       # Enable Flutter pub cache
        
    - name: Clean and Get dependencies
      run: |
        flutter clean
        flutter pub get
        
    - name: Accept Android Licenses
      run: yes | flutter doctor --android-licenses || true

    - name: Force Clear Gradle Cache
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean
        rm -rf ~/.gradle/caches
        cd ..

    - name: Fix Potential Plugin Path Issues (Robust)
      run: |
        # Scan all hosted plugins for missing src/release/java directory
        PUB_CACHE_DIR="${PUB_CACHE:-$HOME/.pub-cache}"
        echo ">>> Scanning pub cache at $PUB_CACHE_DIR for plugin path issues..."
        find "$PUB_CACHE_DIR/hosted/pub.dev" -maxdepth 2 -name "android" -type d | while read -r android_dir; do
          rel_java_dir="$android_dir/src/release/java"
          if [ ! -d "$rel_java_dir" ]; then
            mkdir -p "$rel_java_dir"
            touch "$rel_java_dir/.keep"
            echo ">>> Fixed missing directory: $rel_java_dir"
          fi
        done
        echo ">>> Plugin path verification/fix completed."


    - name: Generate Localizations
      run: flutter gen-l10n

    - name: Create key.properties
      run: |
        echo "${{ secrets.ANDROID_KEY_PROPERTIES }}" > android/key.properties
        
    - name: Decode Keystore
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
      
    - name: Create .env file
      run: |
        echo "GOOGLE_CLOUD_API_KEY=${{ secrets.GOOGLE_CLOUD_API_KEY }}" > .env
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
        echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
        echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env
        echo "GOOGLE_IOS_CLIENT_ID=${{ secrets.GOOGLE_IOS_CLIENT_ID }}" >> .env
        echo "KAKAO_NATIVE_APP_KEY=${{ secrets.KAKAO_NATIVE_APP_KEY }}" >> .env
        echo "KAKAO_JAVASCRIPT_KEY=${{ secrets.KAKAO_JAVASCRIPT_KEY }}" >> .env

    - name: Build APK (Release)
      env:
        FLUTTER_ROOT: ${{ env.FLUTTER_ROOT }}
      run: flutter build apk --release --verbose
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: talkie-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 7

    - name: Build App Bundle (AAB)
      env:
        FLUTTER_ROOT: ${{ env.FLUTTER_ROOT }}
      run: flutter build appbundle --release --verbose
      
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: talkie-release-aab
        path: build/app/outputs/bundle/release/app-release.aab
        retention-days: 7

